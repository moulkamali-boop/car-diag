// 🛡️  الحزمة الأمنية الفيزيائية لتطبيق السيارة (موسعة)
// ============================================================
const CAR_SECURITY = {
    freqRange: { min: 10, max: 200 },
    getNoiseKey() {
        let deviceId = localStorage.getItem('carDeviceId') || 'UNKNOWN';
        let today = new Date().toDateString();
        let hash = 0;
        for (let i = 0; i < deviceId.length; i++) {
            hash = ((hash << 5) - hash) + deviceId.charCodeAt(i);
            hash |= 0;
        }
        for (let i = 0; i < today.length; i++) {
            hash = ((hash << 5) - hash) + today.charCodeAt(i);
            hash |= 0;
        }
        return Math.abs(hash) / 1000000;
    },
    getCalibrationOffset() {
        let session = parseInt(localStorage.getItem('carSessionID') || '0');
        if (session === 0) {
            session = Math.floor(Math.random() * 10000);
            localStorage.setItem('carSessionID', session);
        }
        return (session % 100) / 1000;
    },
    dualCheck(vibrationReading, acousticReading, tolerance = 0.08) {
        const diff = Math.abs(vibrationReading - acousticReading) / Math.max(vibrationReading, acousticReading, 0.001);
        return diff <= tolerance;
    },
    async fetchRemotePatch() {
        try {
            const response = await fetch('https://ai-car-diagnostics.netlify.app/.netlify/functions/get-car-patch?version=1.0');
            if (response.ok) {
                const patch = await response.json();
                if (patch.patch && patch.patch.algorithm) {
                    window.CAR_ALGORITHM_PATCH = patch.patch.algorithm;
                    console.log('✅ تم تحديث خوارزمية السيارة عن بُعد');
                }
            }
        } catch (e) {
            console.log('⏳ تشغيل بخوارزمية السيارة المحلية (بدون تحديث)');
        }
    },
    analyzeEngineSound(signalArray) {
        if (!signalArray || signalArray.length < 2) return { dominant: 50, harmonics: [], roughness: 0 };
        const avg = signalArray.reduce((a, b) => a + b, 0) / signalArray.length;
        const max = Math.max(...signalArray);
        const min = Math.min(...signalArray);
        const roughness = (max - min) / (avg + 0.001);
        return {
            dominant: (max + min) / 2 * 8 + 30,
            harmonics: [2, 3, 4].map(h => (max / h) * 8),
            roughness: Math.min(1, roughness / 4)
        };
    },
    detectAnomaly(vibrationValues, threshold = 0.30) {
        if (!vibrationValues || vibrationValues.length < 3) return false;
        const avg = vibrationValues.reduce((a, b) => a + b, 0) / vibrationValues.length;
        const maxDeviation = Math.max(...vibrationValues.map(v => Math.abs(v - avg)));
        return maxDeviation / (avg + 0.001) > threshold;
    },
    assessSoundQuality(acousticData) {
        if (!acousticData || acousticData.length < 2) return { quality: 'unknown', score: 0 };
        const avg = acousticData.reduce((a, b) => a + b, 0) / acousticData.length;
        const variance = acousticData.reduce((a, b) => a + Math.pow(b - avg, 2), 0) / acousticData.length;
        const score = Math.min(1, variance / 4000);
        let quality = 'smooth';
        if (score > 0.5) quality = 'rough';
        else if (score > 0.25) quality = 'moderate';
        return { quality, score };
    }
};
(async function initCarSecurity() {
    try { await CAR_SECURITY.fetchRemotePatch(); } catch (e) { }
    console.log('🛡️ الطبقة الأمنية الفيزيائية للسيارة مفعلة بالكامل');
})();

// ============================================================
let currentLang = localStorage.getItem('appLang') || 'ar';
let autoTranslateEnabled = localStorage.getItem('autoTranslate') === 'true';
let translationCache = JSON.parse(localStorage.getItem('translationCache') || '{}');

function t(key, ...args) {
  let val = TRANSLATIONS[currentLang]?.[key];
  if (val === undefined || val === null) {
    val = TRANSLATIONS.en[key] || key;
  }
  for (let i = 0; i < args.length; i++) {
    val = val.replace(`{${i}}`, args[i]);
  }
  return val;
}

async function translateText(text, targetLang) {
  if (!autoTranslateEnabled) return text;
  if (targetLang === 'ar' || targetLang === 'en' || targetLang === 'fr') return text;
  const cacheKey = `${targetLang}_${text}`;
  if (translationCache[cacheKey]) return translationCache[cacheKey];
  try {
    const resp = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|${targetLang}`);
    const data = await resp.json();
    let translated = data.responseData.translatedText;
    if (translated && translated !== text && !translated.includes("an error")) {
      translationCache[cacheKey] = translated;
      localStorage.setItem('translationCache', JSON.stringify(translationCache));
      return translated;
    }
  } catch(e) { console.warn(e); }
  return text;
}

let freeUsed = parseInt(localStorage.getItem('freeUsed') || '0');
let paid = parseInt(localStorage.getItem('paid') || '0');
let admin = false;

function updateCreditsUI() {
  let total = admin ? 9999 : Math.max(0, 3 - freeUsed) + paid;
  document.getElementById('creditValue').innerText = total;
  document.getElementById('freeBadge').innerHTML = t('free_badge').replace('3', Math.max(0, 3 - freeUsed));
  const adminSection = document.getElementById('adminSection');
  adminSection.style.display = admin ? 'block' : 'none';
}

function showToast(msg) {
  let t = document.getElementById('toast');
  t.innerText = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function consumeCredit() {
  if (admin) return true;
  let left = Math.max(0, 3 - freeUsed);
  if (left > 0) {
    freeUsed++;
    localStorage.setItem('freeUsed', freeUsed);
    updateCreditsUI();
    showToast(t('diag_ok') + ` (مجاني: ${3 - freeUsed} متبقية)`);
    return true;
  } else if (paid > 0) {
    paid--;
    localStorage.setItem('paid', paid);
    updateCreditsUI();
    showToast(t('diag_ok') + ` (مدفوع: ${paid} متبقية)`);
    return true;
  } else {
    showToast(t('no_credits'));
    return false;
  }
}

function buyPlan(plan) {
  let url = plan === 1 ? "https://mouloudkamali.gumroad.com/l/lqfaey" : (plan === 5 ? "https://mouloudkamali.gumroad.com/l/xovgm" : "https://mouloudkamali.gumroad.com/l/tlbdm");
  window.open(url, '_blank');
  setTimeout(() => {
    if (confirm("هل أكملت الدفع؟ (تجريبي)")) {
      paid += plan;
      localStorage.setItem('paid', paid);
      updateCreditsUI();
      showToast(`✅ تمت إضافة ${plan} تشخيص`);
    }
  }, 2000);
}

document.getElementById('singlePayBtn').onclick = () => buyPlan(1);

function getFault(smoke, sound, vib) {
  let best = null, bestMatch = -1;
  for (let f of faultsDB) {
    let match = 0;
    if (f.sound === sound) match++;
    if (f.vibration === vib) match++;
    if (f.smoke === smoke) match++;
    if (match > bestMatch) {
      bestMatch = match;
      best = f;
    }
  }
  return best || faultsDB[0];
}

// كاميرا
document.getElementById('camStartBtn').onclick = async () => {
  if (measuring) return;
  measuring = true;
  if (cameraStream) cameraStream.getTracks().forEach(t => t.stop());
  try {
    const freq = CAR_SECURITY.freqRange.min + Math.random() * (CAR_SECURITY.freqRange.max - CAR_SECURITY.freqRange.min);
    console.log(`📡 تردد تصوير السيارة: ${freq.toFixed(2)} Hz`);

    let stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    cameraStream = stream;
    let video = document.createElement('video');
    video.srcObject = stream;
    video.autoplay = true;
    video.playsInline = true;
    video.style.width = '100%';
    video.style.maxHeight = '180px';
    let container = document.getElementById('camPreview');
    container.innerHTML = '';
    container.appendChild(video);
    setTimeout(() => {
      let canvas = document.createElement('canvas');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0);
      if (cameraStream) cameraStream.getTracks().forEach(t => t.stop());
      cameraStream = null;
      let data = canvas.getContext('2d').getImageData(0, 0, canvas.width, canvas.height).data;
      let r = 0, g = 0, b = 0;
      for (let i = 0; i < data.length; i += 4) {
        r += data[i];
        g += data[i + 1];
        b += data[i + 2];
      }
      let count = data.length / 4;
      r /= count;
      g /= count;
      b /= count;
      let smoke = 'none';
      if (r > 200 && g > 200 && b > 200) smoke = 'white';
      else if (r < 80 && g < 80 && b < 80) smoke = 'black';
      else if (r < 100 && g < 100 && b > 150) smoke = 'blue';
      else if (r > 150 && g > 150 && b < 100) smoke = 'gray';
      smokeColor = smoke;
      let smokeName = t('smoke_' + smoke);
      document.getElementById('camResult').innerHTML = `<i class="fas fa-smog"></i> ${smokeName}`;
      document.getElementById('camConfirmBtn').disabled = false;
      document.getElementById('camRetakeBtn').disabled = false;
      document.getElementById('camStartBtn').disabled = true;
      video.remove();
      measuring = false;
    }, 8000);
  } catch (e) {
    showToast('❌ فشل الكاميرا');
    measuring = false;
  }
};
document.getElementById('camRetakeBtn').onclick = () => {
  resetSingleSensor('camera');
  document.getElementById('camStartBtn').click();
};
document.getElementById('camConfirmBtn').onclick = () => {
  camOK = true;

// ميكروفون
document.getElementById('micStartBtn').onclick = async () => {
  if (measuring) return;
  measuring = true;
  if (micStream) micStream.getTracks().forEach(t => t.stop());
  try {
    const freq = CAR_SECURITY.freqRange.min + Math.random() * (CAR_SECURITY.freqRange.max - CAR_SECURITY.freqRange.min);
    console.log(`📡 تردد تسجيل السيارة: ${freq.toFixed(2)} Hz`);

    let stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    micStream = stream;
    let actx = new AudioContext();
    audioCtx = actx;
    await actx.resume();
    let source = actx.createMediaStreamSource(stream);
    let analyser = actx.createAnalyser();
    analyser.fftSize = 256;
    source.connect(analyser);
    let data = new Uint8Array(analyser.frequencyBinCount);
    let levels = [];
    document.getElementById('micResult').innerHTML = '⏳ جاري التسجيل...';
    let interval = setInterval(() => {
      analyser.getByteFrequencyData(data);
      let avg = 0;
      for (let v of data) avg += v;
      avg /= data.length;
      levels.push(avg);
    }, 100);
    setTimeout(() => {
      clearInterval(interval);
      let max = Math.max(...levels);
      let mean = levels.reduce((a, b) => a + b, 0) / levels.length;
      let type = 'smooth';
      if (max > 220) type = 'knocking';
      else if (mean > 150 && max < 200) type = 'rough';
      else if (mean < 50 && max < 90) type = 'whistle';
      else if (mean > 90 && max < 150) type = 'ticking';
      else if (mean > 80 && max > 140) type = 'squeal';
      else if (mean < 30) type = 'hiss';
      soundType = type;
      let soundName = t('sound_' + type);
      document.getElementById('micResult').innerHTML = `<i class="fas fa-waveform"></i> ${soundName}`;
      document.getElementById('micConfirmBtn').disabled = false;
      document.getElementById('micRetakeBtn').disabled = false;
      document.getElementById('micStartBtn').disabled = true;
      if (micStream) micStream.getTracks().forEach(t => t.stop());
      if (audioCtx) audioCtx.close();
      micStream = null;
      audioCtx = null;
      measuring = false;
    }, 8000);
  } catch (e) {
    showToast('❌ فشل الميكروفون');
    measuring = false;
  }
};

  resetSingleSensor('mic');
  document.getElementById('micStartBtn').click();
};
document.getElementById('micConfirmBtn').onclick = () => {

  document.getElementById('micConfirmBtn').disabled = true;

// اهتزاز
document.getElementById('vibStartBtn').onclick = () => {
  if (measuring) return;
  measuring = true;
  if (!window.DeviceMotionEvent) {
    showToast('الاهتزاز غير مدعوم');
    measuring = false;
    return;
  }
  const freq = CAR_SECURITY.freqRange.min + Math.random() * (CAR_SECURITY.freqRange.max - CAR_SECURITY.freqRange.min);
  console.log(`📡 تردد قياس اهتزاز السيارة: ${freq.toFixed(2)} Hz`);

  let vals = [];
  let handler = e => {
    let a = e.accelerationIncludingGravity;
    if (a) vals.push(Math.sqrt(a.x * a.x + a.y * a.y + a.z * a.z));
  };
  window.addEventListener('devicemotion', handler);
  document.getElementById('vibResult').innerHTML = '⏳ جاري القياس...';
  setTimeout(() => {
    window.removeEventListener('devicemotion', handler);
    let avg = vals.reduce((a, b) => a + b, 0) / vals.length;
    let level = 'low';
    if (avg > 15) level = 'very_high';
    else if (avg > 8) level = 'high';
    else if (avg > 4) level = 'medium';
    vibIntensity = level;
    let levelName = t(level);
    document.getElementById('vibResult').innerHTML = `<i class="fas fa-vibrate"></i> ${levelName}`;
    document.getElementById('vibConfirmBtn').disabled = false;
    document.getElementById('vibRetakeBtn').disabled = false;
    document.getElementById('vibStartBtn').disabled = true;
    measuring = false;
  }, 6000);
};

// التشخيص النهائي
document.getElementById('analyzeBtn').onclick = async () => {
  if (!smokeColor || !soundType || !vibIntensity) {
    showToast("أكمل جميع الحساسات أولاً");
    return;
  }
  if (!consumeCredit()) return;

  // ----- الدرع الرابع: التحقق الثنائي -----
  const dualTolerance = window.CAR_ALGORITHM_PATCH?.dualCheckTolerance || 0.08;
  const vibrationLevel = (vibIntensity === 'low' ? 0.2 : (vibIntensity === 'medium' ? 0.5 : (vibIntensity === 'high' ? 0.7 : 0.9)));
  const acousticLevel = (soundType === 'smooth' ? 0.2 : (soundType === 'knocking' ? 0.6 : 0.4));
  const isDualValid = CAR_SECURITY.dualCheck(vibrationLevel, acousticLevel, dualTolerance);

  if (!isDualValid) {
    showToast('⚠️ فشل التحقق الثنائي (محاولة خداع محتملة)');
    return;
  }

  let fault = getFault(smokeColor, soundType, vibIntensity);
  let title = (currentLang === 'ar') ? fault.name_ar : fault.name_en;
  let sol = (currentLang === 'ar') ? fault.solution_ar : fault.solution_en;
  let dangerText = t(`severity_${fault.danger || 'low'}`);

  let confidence = 0;
  if (fault.sensorsCount >= 4) confidence = 95;
  else if (fault.sensorsCount >= 3) confidence = 85;
  else confidence = 75;
  if (window.CAR_ALGORITHM_PATCH) confidence += 5;
  confidence = Math.min(98, confidence);

  let html = `<div class="danger-${fault.danger || 'low'}" style="display:inline-block;margin-bottom:8px">⚠️ ${t('severity')}: ${dangerText}</div><br>
              <strong>🔍 ${t('diag_title')}:</strong> ${title}<br><br>
              <strong>🔧 ${t('solution')}:</strong> ${sol}<br><br>
              <div style="font-size:0.7rem;color:#888;">📊 ${t('confidence_label')}: ${confidence}% ${window.CAR_ALGORITHM_PATCH ? '🔒 (مُحدَّث)' : ''}</div>
              ${userText ? `<strong>🗣️ ${t('userName')}:</strong> ${userText}<br><br>` : ''}
              <div class="action-buttons">
                <button id="listenResultBtn" class="action-btn">🔊 ${t('listen')}</button>
                <button id="pdfResultBtn" class="action-btn">📄 ${t('pdf')}</button>
                <button id="copyResultBtn" class="action-btn">📋 ${t('copy')}</button>
                <button id="emailResultBtn" class="action-btn">📧 ${t('email')}</button>
                <button id="saveResultBtn" class="action-btn">💾 ${t('save')}</button>
              </div>`;
  document.getElementById('resultPanel').innerHTML = html;
  document.getElementById('resultPanel').style.display = 'block';
  document.getElementById('diagPanel').style.display = 'none';
  document.getElementById('listenResultBtn').onclick = () => {
    let u = new SpeechSynthesisUtterance(title + '. ' + sol);
    u.lang = BCP_MAP[currentLang] || (currentLang === 'ar' ? 'ar-SA' : (currentLang === 'fr' ? 'fr-FR' : 'en-US'));
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(u);
  };
  document.getElementById('pdfResultBtn').onclick = () => {
    let content = `AI Car Diagnostics\n${t('diag_title')}: ${title}\n${t('solution')}: ${sol}\n${t('severity')}: ${dangerText}\n${userText ? 'Note: ' + userText : ''}\nDate: ${new Date().toLocaleString()}`;
    let blob = new Blob([content], { type: 'text/plain' });
    let a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `diagnosis_${Date.now()}.txt`;
    a.click();
  };
  document.getElementById('copyResultBtn').onclick = () => {
    navigator.clipboard.writeText(title + '\n' + sol);
    showToast(t('copied'));
  };
  document.getElementById('emailResultBtn').onclick = () => {
    window.location.href = `mailto:?subject=Car%20Diagnosis&body=${encodeURIComponent(title + '\n' + sol)}`;
  };
  document.getElementById('saveResultBtn').onclick = () => {
    localStorage.setItem('lastDiagnosis', JSON.stringify({ title, sol }));
    showToast("✅ تم حفظ التشخيص");
  };
};

document.getElementById('startBtn').onclick = () => {
  let total = admin ? 9999 : Math.max(0, 3 - freeUsed) + paid;
  if (total <= 0 && !admin) {
    showToast(t('no_credits'));
    return;
  }
  document.getElementById('diagPanel').style.display = 'block';
  resetSensorsUI();
  document.getElementById('resultPanel').style.display = 'none';
};
document.getElementById('backBtn').onclick = () => {
  document.getElementById('diagPanel').style.display = 'none';
  if (cameraStream) cameraStream.getTracks().forEach(t => t.stop());
  if (micStream) micStream.getTracks().forEach(t => t.stop());
  if (audioCtx) audioCtx.close();
  cameraStream = null;
  micStream = null;
  audioCtx = null;
  measuring = false;
};

// ============================================================
// 🌐  بناء قائمة اللغات (54 لغة)
// ============================================================
function buildLangSelect() {
  let sel = document.getElementById('langSelect');
  sel.innerHTML = '';
  for (let lang of allLangs) {
    let opt = document.createElement('option');
    opt.value = lang.code;
    opt.textContent = `${lang.flag} ${lang.name}`;
    if (lang.code === currentLang) opt.selected = true;
    sel.appendChild(opt);
  }
  sel.onchange = async () => {
    currentLang = sel.value;
    localStorage.setItem('appLang', currentLang);
    let langInfo = allLangs.find(l => l.code === currentLang);
    if (langInfo && langInfo.dir === 'rtl') document.documentElement.dir = 'rtl';
    else document.documentElement.dir = 'ltr';
    await applyTranslations();
  };
}
buildLangSelect();
applyTranslations();

// ============================================================
// 🔧  المدير والإعدادات (5 نقرات على الأيقونة)
// ============================================================
let clickCount = 0, clickTimer = null;
document.getElementById('secretAdminIcon').onclick = () => {
  clickCount++;
  if (clickTimer) clearTimeout(clickTimer);
  clickTimer = setTimeout(() => { clickCount = 0; }, 1000);
  if (clickCount >= 5) {
    admin = true;
    updateCreditsUI();
    showToast('✅ وضع المطور مفعل (5 نقرات)');
    document.getElementById('adminHint').innerHTML = '👑 وضع المطور نشط (5 نقرات)';
    clickCount = 0;
  }
};

const settingsModal = document.getElementById('settingsModal');
const autoTranslateCheckbox = document.getElementById('autoTranslateCheckbox');
autoTranslateCheckbox.checked = autoTranslateEnabled;
autoTranslateCheckbox.onchange = () => {
  autoTranslateEnabled = autoTranslateCheckbox.checked;
  localStorage.setItem('autoTranslate', autoTranslateEnabled);
  if (!autoTranslateEnabled) {
    translationCache = {};
    localStorage.setItem('translationCache', '{}');
  }
  applyTranslations();
};
document.getElementById('settingsIcon').onclick = () => settingsModal.classList.add('show');
document.getElementById('closeSettingsBtn').onclick = () => settingsModal.classList.remove('show');
settingsModal.onclick = (e) => {
  if (e.target === settingsModal) settingsModal.classList.remove('show');
};

      title: 'AI Car Diagnostics',
