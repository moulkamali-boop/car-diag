<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>AI Car Diagnostics - الإصدار النهائي</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0a0f1a;color:#fff;font-family:'Segoe UI',system-ui,sans-serif;padding:1rem}
    .container{max-width:700px;margin:auto;background:#0e1422;border-radius:2rem;border:1px solid #f5a623;overflow:hidden;box-shadow:0 10px 25px -5px black}
    .header{display:flex;align-items:center;justify-content:space-between;padding:0.8rem 1rem;background:#0b0f1a;border-bottom:3px solid #f5a623;flex-wrap:wrap;gap:8px}
    .qr-code{width:50px;height:50px;background:#fff;border-radius:16px;display:flex;align-items:center;justify-content:center;cursor:pointer}
    .qr-code img{width:44px;height:44px}
    .title-section{text-align:center;flex:1;display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap}
    .title-fixed{font-size:1.4rem;font-weight:800;background:linear-gradient(135deg,#ffe6b0,#f5a623);background-clip:text;-webkit-background-clip:text;color:transparent}
    .title-translated{font-size:0.8rem;color:#b9c7d9}
    .car-icon{font-size:1.8rem;color:#f5a623;cursor:pointer}
    .info-strip{display:flex;justify-content:space-between;align-items:center;background:#00000055;padding:6px 12px;font-size:0.7rem;flex-wrap:wrap;gap:6px;margin-top:4px}
    .lang-device{display:flex;gap:8px;align-items:center}
    .lang-select{background:#1e2a3a;border:1px solid #f5a623;border-radius:40px;padding:4px 8px;color:#fff;font-size:0.7rem}
    .device-id{background:#1e2a3a;border-radius:40px;padding:4px 10px;font-family:monospace;font-size:0.7rem}
    .free-badge{text-align:center;background:#f5a62320;margin:8px 12px;padding:6px;border-radius:40px;font-weight:bold;color:#f5a623}
    .credit-card{background:#0f172a;border-radius:1.5rem;margin:12px;padding:10px;text-align:center;border:1px solid #3b82f6}
    .credit-amount{font-size:1.8rem;font-weight:800;color:#f5a623}
    .pay-buttons{display:flex;gap:8px;justify-content:center;margin:6px 0;flex-wrap:wrap}
    .pay-btn{background:#10b981;border:none;border-radius:60px;padding:5px 12px;font-weight:bold;cursor:pointer;color:#fff}
    .license-box{display:flex;gap:8px;justify-content:center;margin-top:6px;flex-wrap:wrap}
    .license-box input{background:#1e2a3a;border:1px solid #3b82f6;border-radius:60px;padding:5px 12px;color:#fff;width:140px}
    .license-box button{background:#3b82f6;border:none;border-radius:60px;padding:5px 16px;cursor:pointer;font-weight:bold;color:#fff}
    .btn-primary{background:#8b5cf6;width:100%;padding:12px;border:none;border-radius:40px;font-weight:bold;color:#fff;margin:12px 0;cursor:pointer}
    .sensor-card{background:#1e2a3e;border-radius:1.5rem;padding:12px;margin:12px;border:2px solid #3b82f6}
    .sensor-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
    .sensor-icon{font-size:1.8rem;color:#f5a623}
    .sensor-instr{font-size:0.7rem;color:#ccc;margin-bottom:8px}
    .sensor-result{background:#03060c;border-radius:1rem;padding:8px;margin-top:8px;font-size:0.8rem;min-height:55px;border:1px dashed #f5a623}
    .btn-group{display:flex;gap:8px;margin:8px 0;flex-wrap:wrap}
    button{background:#f97316;border:none;border-radius:40px;padding:6px 12px;font-weight:bold;cursor:pointer;color:#fff}
    button:disabled{opacity:0.5;cursor:not-allowed}
    .result-area{background:#0a1020;border-radius:1.5rem;margin:12px;padding:16px;border:2px solid #f5a623}
    .action-buttons{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
    .action-btn{flex:1;background:#2d3a4e;padding:8px;border-radius:40px;text-align:center;cursor:pointer;font-size:0.7rem}
    .danger-low{background:#10b981;color:#000;display:inline-block;padding:2px 12px;border-radius:30px}
    .danger-medium{background:#f59e0b;color:#000}
    .danger-high{background:#ef4444;color:#fff}
    .danger-critical{background:#7f1d1d;color:#fff}
    footer{text-align:center;padding:12px;background:#060a12;border-top:1px solid #2a3a5a;font-size:0.65rem}
    footer a{color:#f5a623;text-decoration:none;word-break:break-all}
    video,canvas{width:100%;max-height:180px;border-radius:12px;margin-top:6px}
    .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#f97316;padding:5px 15px;border-radius:30px;opacity:0;transition:0.2s;z-index:999;font-weight:bold;color:#000}
    .toast.show{opacity:1}
    .hidden{display:none}
    .admin-only{display:none; margin-top:8px; font-size:0.7rem; background:#1e293b; border-radius:20px; padding:6px; text-align:center}
  </style>
</head>

<div class="container">
  <div class="header">
    <div class="qr-code" id="qrContainer"><img id="qrImage" alt="QR"></div>

        <div class="title-translated" id="dynamicSubtitle">Smart Engine Diagnosis</div>
      </div>

    <div style="width:40px"></div>
  </div>

  <div class="info-strip">
    <span>📍 <span id="currentLocation">جاري...</span></span>
    <span>🕐 <span id="currentTime">--:--:--</span></span>
    <span>📅 <span id="currentDate">--/--/----</span></span>
    <div class="lang-device">
      <select id="langSelect" class="lang-select"></select>
      <span class="device-id" id="deviceId">ID: ----</span>
    </div>
  </div>

  <div class="free-badge" id="freeBadge">🔓 3 تشخيصات مجانية متبقية</div>
  <div class="credit-card">
    <div><i class="fas fa-coins"></i> <span id="creditLabel">الرصيد المتبقي:</span> <span class="credit-amount" id="creditValue">0</span></div>
    <div class="pay-buttons">
      <button class="pay-btn" id="singlePayBtn">💵 1 تشخيص ($2)</button>
      <button class="pay-btn" id="pack5PayBtn">💵 5 تشخيصات ($8)</button>
      <button class="pay-btn" id="pack15PayBtn">💵 15 تشخيصاً ($20)</button>
    </div>
    <div class="license-box">
      <input type="text" id="licenseCode" placeholder="🔑 رمز التفعيل">
      <button id="activateLicenseBtn">تفعيل</button>
    </div>
    <div id="adminHint" style="font-size:0.65rem; margin-top:5px;"></div>
    <div id="adminSection" class="admin-only">
      <i class="fas fa-code-branch"></i> رابط المشروع (للمطور): <a href="https://github.com/moulkamali-boop/car-diag" target="_blank">https://github.com/moulkamali-boop/car-diag</a>
    </div>
  </div>

  <button id="startBtn" class="btn-primary">🧠 ابدأ التشخيص الذكي</button>

  <div id="diagPanel" style="display:none;">
    <div class="sensor-card">
      <div class="sensor-header"><i class="fas fa-camera sensor-icon"></i><span id="camName"></span></div>
      <div class="sensor-instr" id="camInstr"></div>
      <div id="camPreview"></div>
      <div id="camResult" class="sensor-result"></div>
      <div class="btn-group">
        <button id="camStartBtn">▶ <span id="camStartText"></span> (8s)</button>
        <button id="camConfirmBtn" disabled>✅ <span id="camConfirmText"></span></button>
        <button id="camRetakeBtn" disabled>🔄 <span id="camRetakeText"></span></button>
      </div>
    </div>

    <div class="sensor-card">
      <div class="sensor-header"><i class="fas fa-microphone sensor-icon"></i><span id="micName"></span></div>
      <div class="sensor-instr" id="micInstr"></div>
      <div id="micResult" class="sensor-result"></div>
      <div class="btn-group">
        <button id="micStartBtn">▶ <span id="micStartText"></span> (8s)</button>
        <button id="micConfirmBtn" disabled>✅ <span id="micConfirmText"></span></button>
        <button id="micRetakeBtn" disabled>🔄 <span id="micRetakeText"></span></button>
      </div>
    </div>

    <div class="sensor-card">
      <div class="sensor-header"><i class="fas fa-vibrate sensor-icon"></i><span id="vibName"></span></div>
      <div class="sensor-instr" id="vibInstr"></div>
      <div id="vibResult" class="sensor-result"></div>
      <div class="btn-group">
        <button id="vibStartBtn">▶ <span id="vibStartText"></span> (6s)</button>
        <button id="vibConfirmBtn" disabled>✅ <span id="vibConfirmText"></span></button>
        <button id="vibRetakeBtn" disabled>🔄 <span id="vibRetakeText"></span></button>
      </div>
    </div>

    <div class="sensor-card">
      <div class="sensor-header"><i class="fas fa-user-edit sensor-icon"></i><span id="userName"></span></div>
      <div class="sensor-instr" id="userInstr"></div>
      <div id="userResult" class="sensor-result"></div>
      <div class="btn-group">
        <button id="userSpeakBtn">🎤 <span id="userSpeakText"></span></button>
        <button id="userClearBtn">🗑 <span id="userClearText"></span></button>
      </div>
    </div>

    <button id="analyzeBtn" class="btn-primary" disabled>📊 <span id="analyzeText"></span></button>
    <button id="backBtn" class="btn-primary" style="background:#555;">↩️ <span id="backText"></span></button>
  </div>

  <div id="resultPanel" style="display:none;" class="result-area"></div>

  <footer>
    <a href="https://ai-car-diagnostics.netlify.app" target="_blank">https://ai-car-diagnostics.netlify.app</a>
  </footer>
</div>
<div id="toast" class="toast"></div>

        fault_none_squeal:"Courroie desserrée", solution_none_squeal:"Tendre courroie",
        fault_normal_normal:"Pas de défaut", solution_normal_normal:"Entretien régulier"
  }
};
for(let l of langList) if(!translations[l]) translations[l] = translations.en;

// ==================== 4. قاعدة بيانات الأعطال ====================
const faultsDB = [
  { smoke:'white', sound:'knocking', vib:'high', faultKey:'white_knocking', danger:'high' },
  { smoke:'white', sound:'smooth', vib:'medium', faultKey:'white_smooth', danger:'medium' },
  { smoke:'black', sound:'rough', vib:'medium', faultKey:'black_rough', danger:'medium' },
  { smoke:'black', sound:'knocking', vib:'high', faultKey:'black_knocking', danger:'high' },
  { smoke:'blue', sound:'smooth', vib:'low', faultKey:'blue_smooth', danger:'high' },
  { smoke:'blue', sound:'knocking', vib:'high', faultKey:'blue_knocking', danger:'critical' },
  { smoke:'gray', sound:'whistle', vib:'medium', faultKey:'gray_whistle', danger:'medium' },
  { smoke:'gray', sound:'smooth', vib:'low', faultKey:'gray_smooth', danger:'low' },
  { smoke:'none', sound:'ticking', vib:'medium', faultKey:'none_ticking', danger:'medium' },
  { smoke:'none', sound:'squeal', vib:'low', faultKey:'none_squeal', danger:'low' },
  { smoke:'none', sound:'smooth', vib:'low', faultKey:'normal_normal', danger:'low' }
];
function getFault(smoke,sound,vib) {
  let f = faultsDB.find(f=>f.smoke===smoke && f.sound===sound && f.vib===vib) ||
          faultsDB.find(f=>f.smoke===smoke && f.sound===sound) ||
          faultsDB.find(f=>f.smoke===smoke) ||
          faultsDB[faultsDB.length-1];
  return f;
}

// ==================== 5. الحساسات والتشخيص ====================
let camOK=false, micOK=false, vibOK=false;
let smokeColor=null, soundType=null, vibIntensity=null, userText="";
let cameraStream=null, micStream=null, audioCtx=null;
let measuring = false;

function resetSensorsUI() {
  camOK=false; micOK=false; vibOK=false;
  smokeColor=null; soundType=null; vibIntensity=null;
  document.getElementById('camResult').innerHTML='';
  document.getElementById('micResult').innerHTML='';
  document.getElementById('vibResult').innerHTML='';
  const camConfirm = document.getElementById('camConfirmBtn');
  const camRetake = document.getElementById('camRetakeBtn');
  const micConfirm = document.getElementById('micConfirmBtn');
  const micRetake = document.getElementById('micRetakeBtn');
  const vibConfirm = document.getElementById('vibConfirmBtn');
  const vibRetake = document.getElementById('vibRetakeBtn');
  camConfirm.disabled = true; camRetake.disabled = true;
  micConfirm.disabled = true; micRetake.disabled = true;
  vibConfirm.disabled = true; vibRetake.disabled = true;
  document.getElementById('camStartBtn').disabled=false;
  document.getElementById('micStartBtn').disabled=false;
  document.getElementById('vibStartBtn').disabled=false;
  document.getElementById('analyzeBtn').disabled=true;
}
function checkAllReady() {
  if(camOK && micOK && vibOK) document.getElementById('analyzeBtn').disabled=false;
}

// كاميرا
document.getElementById('camStartBtn').onclick = async () => {
  if(measuring) return; measuring=true;
  if(cameraStream) cameraStream.getTracks().forEach(t=>t.stop());
  try {
    let stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    cameraStream = stream;
    let video = document.createElement('video');
    video.srcObject = stream; video.autoplay=true; video.playsInline=true;
    video.style.width='100%'; video.style.maxHeight='180px';
    let container = document.getElementById('camPreview');
    container.innerHTML = ''; container.appendChild(video);
    setTimeout(()=>{
      let canvas = document.createElement('canvas');
      canvas.width = video.videoWidth; canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video,0,0);
      if(cameraStream) cameraStream.getTracks().forEach(t=>t.stop()); cameraStream=null;
      let data = canvas.getContext('2d').getImageData(0,0,canvas.width,canvas.height).data;
      let r=0,g=0,b=0;
      for(let i=0;i<data.length;i+=4){ r+=data[i]; g+=data[i+1]; b+=data[i+2]; }
      let count=data.length/4; r/=count; g/=count; b/=count;
      let smoke='none';
      if(r>200 && g>200 && b>200) smoke='white';
      else if(r<80 && g<80 && b<80) smoke='black';
      else if(r<100 && g<100 && b>150) smoke='blue';
      else if(r>150 && g>150 && b<100) smoke='gray';
      smokeColor = smoke;
      document.getElementById('camResult').innerHTML = `<i class="fas fa-smog"></i> ${t('smoke_'+smoke)}`;
      document.getElementById('camConfirmBtn').disabled=false;
      document.getElementById('camRetakeBtn').disabled=false;
      document.getElementById('camStartBtn').disabled=true;
      video.remove();
      measuring=false;
    },8000);
  } catch(e){ showToast('❌ فشل الكاميرا'); measuring=false; }
};
document.getElementById('camRetakeBtn').onclick = () => {
  document.getElementById('camStartBtn').click();
};
document.getElementById('camConfirmBtn').onclick = () => { camOK=true; document.getElementById('camConfirmBtn').disabled=true; checkAllReady(); };

// ميكروفون
document.getElementById('micStartBtn').onclick = async () => {
  if(measuring) return; measuring=true;
  if(micStream) micStream.getTracks().forEach(t=>t.stop());
  try {
    let stream = await navigator.mediaDevices.getUserMedia({audio:true});
    micStream = stream;
    let actx = new AudioContext(); audioCtx=actx; await actx.resume();
    let source = actx.createMediaStreamSource(stream);
    let analyser = actx.createAnalyser(); analyser.fftSize=256;
    source.connect(analyser);
    let data = new Uint8Array(analyser.frequencyBinCount);
    let levels=[];
    document.getElementById('micResult').innerHTML = '⏳ جاري التسجيل...';
    let interval = setInterval(()=>{
      analyser.getByteFrequencyData(data);
      let avg=0; for(let v of data) avg+=v; avg/=data.length;
      levels.push(avg);
    },100);
    setTimeout(()=>{
      clearInterval(interval);
      let max = Math.max(...levels);
      let mean = levels.reduce((a,b)=>a+b,0)/levels.length;
      let type = 'smooth';
      if(max>220) type='knocking';
      else if(mean>150 && max<200) type='rough';
      else if(mean<50 && max<90) type='whistle';
      else if(mean>90 && max<150) type='ticking';
      else if(mean>80 && max>140) type='squeal';
      else if(mean<30) type='hiss';
      soundType = type;
      document.getElementById('micResult').innerHTML = `<i class="fas fa-waveform"></i> ${t('sound_'+type)}`;
      document.getElementById('micConfirmBtn').disabled=false;
      document.getElementById('micRetakeBtn').disabled=false;
      document.getElementById('micStartBtn').disabled=true;
      if(micStream) micStream.getTracks().forEach(t=>t.stop()); if(audioCtx) audioCtx.close();
      micStream=null; audioCtx=null;
      measuring=false;
    },8000);
  } catch(e){ showToast('❌ فشل الميكروفون'); measuring=false; }
};
document.getElementById('micRetakeBtn').onclick = () => {
  document.getElementById('micStartBtn').click();
};
document.getElementById('micConfirmBtn').onclick = () => { micOK=true; document.getElementById('micConfirmBtn').disabled=true; checkAllReady(); };

// اهتزاز
document.getElementById('vibStartBtn').onclick = () => {
  if(measuring) return; measuring=true;
  if(!window.DeviceMotionEvent){ showToast('الاهتزاز غير مدعوم'); measuring=false; return; }
  let vals=[];
  let handler = e => { let a=e.accelerationIncludingGravity; if(a) vals.push(Math.sqrt(a.x*a.x+a.y*a.y+a.z*a.z)); };
  window.addEventListener('devicemotion',handler);
  document.getElementById('vibResult').innerHTML = '⏳ جاري القياس...';
  setTimeout(()=>{
    window.removeEventListener('devicemotion',handler);
    let avg = vals.reduce((a,b)=>a+b,0)/vals.length;
    let level = 'low';
    if(avg>15) level='very_high';
    else if(avg>8) level='high';
    else if(avg>4) level='medium';
    vibIntensity = level;
    document.getElementById('vibResult').innerHTML = `<i class="fas fa-vibrate"></i> ${t(level)}`;
    document.getElementById('vibConfirmBtn').disabled=false;
    document.getElementById('vibRetakeBtn').disabled=false;
    document.getElementById('vibStartBtn').disabled=true;
    measuring=false;
  },6000);
};
document.getElementById('vibRetakeBtn').onclick = () => {
  document.getElementById('vibStartBtn').click();
};
document.getElementById('vibConfirmBtn').onclick = () => { vibOK=true; document.getElementById('vibConfirmBtn').disabled=true; checkAllReady(); };

// إدخال المستخدم
let recognition=null;
document.getElementById('userSpeakBtn').onclick = () => {
  if(!('webkitSpeechRecognition' in window)){ showToast("❌ غير مدعوم"); return; }
  const SpeechRecognition = window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();
  recognition.lang = BCP_MAP[currentLang] || (currentLang==='ar'?'ar-EG':(currentLang==='fr'?'fr-FR':'en-US'));
  recognition.onresult = (e) => {
    userText = e.results[0][0].transcript;
    document.getElementById('userResult').innerHTML = `📝 ${userText}`;
    showToast(t('copied'));
  };
  recognition.start();
};
document.getElementById('userClearBtn').onclick = () => { userText=""; document.getElementById('userResult').innerHTML = ''; };

// التشخيص النهائي
document.getElementById('analyzeBtn').onclick = () => {
  if(!smokeColor || !soundType || !vibIntensity) { showToast("أكمل جميع الحساسات أولاً"); return; }
  if(!consumeCredit()) return;
  let fault = getFault(smokeColor, soundType, vibIntensity);
  let title = t(`fault_${fault.faultKey}`) || t('fault_normal_normal');
  let sol = t(`solution_${fault.faultKey}`) || t('solution_normal_normal');
  let dangerText = t(`severity_${fault.danger}`);
  let html = `<div class="danger-${fault.danger}" style="display:inline-block;margin-bottom:8px">⚠️ ${t('severity')}: ${dangerText}</div><br>
              <strong>🔍 ${t('diag_title')}:</strong> ${title}<br><br>
              <strong>🔧 ${t('solution')}:</strong> ${sol}<br><br>
              ${userText? `<strong>🗣️ ملاحظة المستخدم:</strong> ${userText}<br><br>` : ''}
              <div class="action-buttons">
                <button id="listenResultBtn" class="action-btn">🔊 ${t('listen')}</button>
                <button id="pdfResultBtn" class="action-btn">📄 ${t('pdf')}</button>
                <button id="copyResultBtn" class="action-btn">📋 ${t('copy')}</button>
                <button id="emailResultBtn" class="action-btn">📧 ${t('email')}</button>
                <button id="saveResultBtn" class="action-btn">💾 ${t('save')}</button>
              </div>`;
  document.getElementById('resultPanel').innerHTML = html;
  document.getElementById('resultPanel').style.display = 'block';
  document.getElementById('diagPanel').style.display = 'none';
  // ربط الأزرار
  document.getElementById('listenResultBtn').onclick = () => {
    let u = new SpeechSynthesisUtterance(title+'. '+sol);
    u.lang = BCP_MAP[currentLang] || (currentLang==='ar'?'ar-EG':(currentLang==='fr'?'fr-FR':'en-US'));
    window.speechSynthesis.cancel(); window.speechSynthesis.speak(u);
  };
  document.getElementById('pdfResultBtn').onclick = () => {
    let content = `AI Car Diagnostics\n${t('diag_title')}: ${title}\n${t('solution')}: ${sol}\n${t('severity')}: ${dangerText}\n${userText? 'Note: '+userText:''}\nDate: ${new Date().toLocaleString()}`;
    let blob = new Blob([content],{type:'text/plain'});
    let a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`diagnosis_${Date.now()}.txt`; a.click();
  };
  document.getElementById('copyResultBtn').onclick = () => {
    navigator.clipboard.writeText(title+'\n'+sol);
    showToast(t('copied'));
  };
  document.getElementById('emailResultBtn').onclick = () => {
    window.location.href=`mailto:?subject=Car%20Diagnosis&body=${encodeURIComponent(title+'\n'+sol)}`;
  };
  document.getElementById('saveResultBtn').onclick = () => {
    localStorage.setItem('lastDiagnosis', JSON.stringify({title,sol}));
    showToast("✅ تم حفظ التشخيص");
  };
};
