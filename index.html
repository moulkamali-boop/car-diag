<html lang="ar" dir="rtl">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>المخبر الفيزيائي الناطق</title>

        body{background:#0a0f1a;color:#fff;font-family:'Segoe UI',system-ui,sans-serif;padding:0.8rem}
        .container{max-width:720px;margin:auto;background:#0e1422;border-radius:2rem;border:1px solid #f5a623;overflow:hidden;box-shadow:0 10px 30px -8px #000}
        .gold-line{height:2px;background:linear-gradient(90deg,transparent,#f5a623,transparent);margin:10px 0;border:none}
        .header{display:flex;align-items:center;justify-content:space-between;padding:0.8rem 1rem;background:#0b0f1a;border-bottom:3px solid #f5a623;gap:8px;flex-wrap:wrap}
        .qr-code{width:50px;height:50px;background:#fff;border-radius:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;overflow:hidden}
        .qr-code img{width:44px;height:44px}
        .title-section{text-align:center;flex:1}
        .title-fixed{font-size:1.2rem;font-weight:800;background:linear-gradient(135deg,#ffe6b0,#f5a623);background-clip:text;-webkit-background-clip:text;color:transparent}
        .title-translated{font-size:0.75rem;color:#b9c7d9;min-height:1.2rem}
        .main-icon{font-size:2rem;color:#f5a623;cursor:pointer;width:44px;text-align:center;transition:0.3s}
        .main-icon:active{transform:scale(0.9)}
        .info-strip{display:flex;justify-content:space-between;align-items:center;background:#00000055;padding:4px 10px;font-size:0.65rem;flex-wrap:wrap;gap:4px}
        .lang-device{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
        .lang-select{background:#1e2a3a;border:1px solid #f5a623;border-radius:40px;padding:2px 8px;color:#fff;font-size:0.7rem;max-width:160px;cursor:pointer}
        .device-id{background:#1e2a3a;border-radius:40px;padding:2px 10px;font-family:monospace;font-size:0.65rem}
        .free-badge{text-align:center;background:#f5a62320;margin:8px 12px;padding:6px;border-radius:40px;font-weight:bold;color:#f5a623;font-size:0.9rem}
        .credit-card{background:#0f172a;border-radius:1.5rem;margin:8px 12px;padding:12px;text-align:center;border:1px solid #3b82f6}
        .credit-amount{font-size:1.8rem;font-weight:800;color:#f5a623}
        .pay-buttons{display:flex;gap:8px;justify-content:center;margin:6px 0;flex-wrap:wrap}
        .pay-btn{background:#10b981;border:none;border-radius:60px;padding:5px 12px;font-weight:bold;cursor:pointer;color:#fff;font-size:0.75rem}
        .pay-btn:active{transform:scale(0.95)}
        .license-box{display:flex;gap:6px;justify-content:center;margin-top:6px;flex-wrap:wrap}
        .license-box input{background:#1e2a3a;border:1px solid #3b82f6;border-radius:60px;padding:4px 10px;color:#fff;width:130px;font-size:0.7rem}
        .license-box button{background:#3b82f6;border:none;border-radius:60px;padding:4px 14px;cursor:pointer;font-weight:bold;color:#fff;font-size:0.7rem}
        .license-box button:active{transform:scale(0.95)}
        .admin-only{display:none;margin-top:6px;font-size:0.6rem;background:#1e293b;border-radius:20px;padding:4px 8px;text-align:center}
        #adminHint{font-size:0.6rem;color:#f5a623;min-height:1.2rem}
        .selector-area{display:flex;gap:10px;padding:10px 16px;flex-wrap:wrap;align-items:center;background:#0b0f18;border-bottom:1px solid #2a3a5a}
        .selector-area label{font-size:0.75rem;color:#b9c7d9;display:flex;align-items:center;gap:6px}
        .selector-area select{background:#1e2a3a;border:1px solid #f5a623;border-radius:40px;padding:6px 12px;color:#fff;font-size:0.75rem;cursor:pointer;flex:1;min-width:100px}
        .selector-area select:focus{outline:2px solid #f5a623}
        #subDeviceContainer{display:none;flex:1;min-width:100px}
        .btn-primary{background:#8b5cf6;width:100%;padding:12px;border:none;border-radius:40px;font-weight:bold;color:#fff;margin:10px 0;cursor:pointer;font-size:1rem;transition:0.2s}
        .btn-primary:active{transform:scale(0.97)}
        .btn-primary:disabled{opacity:0.5;cursor:not-allowed}
        .sensor-card{background:#1e2a3e;border-radius:1.5rem;padding:12px;margin:10px 0;border:2px solid #3b82f6;transition:0.3s}
        .sensor-card.active{border-color:#f5a623}
        .sensor-card.done{border-color:#10b981}
        .sensor-card.result-green{border-color:#10b981}
        .sensor-card.result-orange{border-color:#f59e0b}
        .sensor-card.result-red{border-color:#ef4444}
        .sensor-header{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
        .sensor-icon{font-size:1.6rem;color:#f5a623}
        .sensor-title{font-weight:bold;font-size:0.9rem}
        .sensor-instr{font-size:0.7rem;color:#ccc;margin:4px 0}
        .sensor-preview{background:#000;border-radius:8px;padding:6px;min-height:30px;font-size:0.75rem;color:#94a3b8;margin:4px 0}
        .sensor-preview video{width:100%;max-height:150px;border-radius:8px}
        .sensor-result{background:#03060c;border-radius:1rem;padding:6px;margin-top:4px;font-size:0.75rem;min-height:26px;border:1px dashed #f5a623}
        .btn-group{display:flex;gap:6px;flex-wrap:wrap;margin:4px 0}
        .btn-group button{background:#f97316;border:none;border-radius:40px;padding:4px 12px;font-weight:bold;cursor:pointer;color:#fff;font-size:0.7rem}
        .btn-group button:disabled{opacity:0.4;cursor:not-allowed}
        .btn-group button:active:not(:disabled){transform:scale(0.95)}
        .btn-group .confirm-btn{background:#10b981}
        .btn-group .retake-btn{background:#f59e0b}
        .btn-group .stop-btn{background:#ef4444}
        .result-area{background:#0a1020;border-radius:1.5rem;margin:10px 0;padding:14px;border:2px solid #f5a623;display:none}
        .action-buttons{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
        .action-btn{flex:1;background:#2d3a4e;padding:6px;border-radius:40px;text-align:center;cursor:pointer;font-size:0.65rem;border:none;color:#fff;min-width:60px}
        .action-btn:active{transform:scale(0.95)}
        .conf-bar{height:5px;background:#1e293b;border-radius:4px;margin:4px 0;overflow:hidden}
        .conf-bar .fill{height:100%;border-radius:4px;transition:width 0.5s}
        .advisor-box{background:#1e293b;border-radius:1.5rem;margin:12px 0;padding:12px 16px;border:2px solid #f5a623;font-size:0.9rem;color:#f5a623;display:flex;align-items:center;gap:10px;min-height:60px;word-break:break-word}
        .advisor-box i{font-size:1.8rem;flex-shrink:0}
        .advisor-box span{display:block;line-height:1.4}
        .share-buttons{display:flex;justify-content:center;gap:8px;margin-top:10px;flex-wrap:wrap}
        .share-btn{background:#1e293b;border:1px solid #f5a623;border-radius:40px;padding:4px 12px;cursor:pointer;font-size:0.65rem;display:inline-flex;align-items:center;gap:4px;color:#fff}
        .share-btn:active{transform:scale(0.95)}
        footer{text-align:center;padding:8px;background:#060a12;border-top:1px solid #2a3a5a;font-size:0.6rem;margin-top:10px}
        .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#f97316;padding:4px 14px;border-radius:30px;opacity:0;transition:0.2s;z-index:999;font-weight:bold;color:#000;font-size:0.8rem;pointer-events:none}
        .toast.show{opacity:1}
        .hidden{display:none}
        video{width:100%;max-height:160px;border-radius:12px;margin-top:4px}
        .empty-state{text-align:center;padding:40px 20px;color:#6c7a92;font-size:0.9rem}
        .empty-state i{font-size:3rem;display:block;margin-bottom:12px;color:#f5a623}

</head>
<body>
<div class="container">

    <!-- HEADER -->
    <div class="header">
        <div class="qr-code" id="qrContainer"><img id="qrImage" alt="QR"></div>
        <div class="title-section">
            <div class="title-fixed">⚡ المخبر الفيزيائي</div>
            <div class="title-translated" id="dynamicSubtitle">النموذج القياسي للتشخيص الفيزيائي</div>
        </div>
        <div class="main-icon" id="secretAdminIcon"><i class="fas fa-flask"></i></div>
    </div>
    <hr class="gold-line">

    <!-- INFO STRIP -->
    <div class="info-strip">
        <span>📍 <span id="currentLocation">جاري...</span></span>
        <span>🕐 <span id="currentTime">--:--:--</span></span>
        <span>📅 <span id="currentDate">--/--/----</span></span>
        <div class="lang-device">
            <select id="langSelect" class="lang-select"></select>
            <span class="device-id" id="deviceId">ID: ----</span>
        </div>
    </div>
    <hr class="gold-line">

    <!-- FREE BADGE & CREDIT -->
    <div class="free-badge" id="freeBadge">🔓 3 تشخيصات مجانية متبقية</div>
    <div class="credit-card">
        <div><i class="fas fa-coins"></i> <span id="creditLabel">الرصيد المتبقي:</span> <span class="credit-amount" id="creditValue">0</span></div>
        <div class="pay-buttons">
            <button class="pay-btn" id="singlePayBtn">💵 1 تشخيص ($2)</button>
            <button class="pay-btn" id="pack5PayBtn">💵 5 تشخيصات ($8)</button>
            <button class="pay-btn" id="pack15PayBtn">💵 15 تشخيصاً ($20)</button>
        </div>
        <div class="license-box">
            <input type="text" id="licenseCode" placeholder="🔑 رمز التفعيل">
            <button id="activateLicenseBtn">تفعيل</button>
        </div>
        <div id="adminHint"></div>
        <div id="adminSection" class="admin-only"><i class="fas fa-code-branch"></i> رابط المشروع: <a href="#" target="_blank">github.com/omni-diagnostics</a></div>
    </div>
    <hr class="gold-line">

    <!-- APP SELECTOR -->
    <div class="selector-area">
        <label for="appSelect"><i class="fas fa-cubes"></i> <span id="appLabel">التطبيق:</span></label>
        <select id="appSelect"></select>
        <div id="subDeviceContainer">
            <label for="subDeviceSelect"><i class="fas fa-tools"></i> <span id="deviceLabel">الجهاز:</span></label>
            <select id="subDeviceSelect"></select>
        </div>
    </div>

    <!-- LAB PANEL -->
    <div id="labPanel" style="display:none; padding:0 12px;">
        <button id="backBtn" class="btn-primary" style="background:#555;">↩️ <span id="backLabel">العودة للقائمة</span></button>

        <div id="advisorBox" class="advisor-box">
            <i class="fas fa-lightbulb"></i>
            <span id="advisorText">💡 مرحباً! اختر تطبيقاً وجهازاً فرعياً إن لزم.</span>
        </div>

        <div id="sensorsContainer"></div>

        <button id="analyzeBtn" class="btn-primary" disabled>📊 <span id="analyzeLabel">تحليل البيانات والتشخيص النهائي</span></button>
        <div id="resultPanel" class="result-area"></div>

        <div class="share-buttons">
            <button class="share-btn" id="shareWhatsApp"><i class="fab fa-whatsapp"></i> WhatsApp</button>
            <button class="share-btn" id="shareEmail"><i class="fas fa-envelope"></i> Email</button>
            <button class="share-btn" id="shareGeneral"><i class="fas fa-share-alt"></i> <span id="shareLabel">مشاركة</span></button>
        </div>
    </div>

    <footer>
        <div style="word-break:break-all;font-size:0.65rem;">https://omni-diagnostics.netlify.app</div>
    </footer>
</div>
<div id="toast" class="toast"></div>

// ============================================================
function t(key, vars) {
    var str = (translations[currentLang] && translations[currentLang][key]) ||
              (translations.en && translations.en[key]) ||
              key;
    if (vars) {
        for (var k in vars) {
            str = str.replace(new RegExp('\\{' + k + '\\}', 'g'), vars[k]);
        }
    }
    return str;
}

async function tt(text, targetLang) {
    if (!targetLang || targetLang === 'ar' || targetLang === 'en' || targetLang === 'fr') return text;
    var cacheKey = targetLang + '_' + text;
    if (transCache[cacheKey]) return transCache[cacheKey];
    try {
        var resp = await fetch('https://api.mymemory.translated.net/get?q=' + encodeURIComponent(text) + '&langpair=en|' + targetLang);
        var data = await resp.json();
        var translated = data.responseData && data.responseData.translatedText;
        if (translated && translated !== text && !translated.includes('an error')) {
            transCache[cacheKey] = translated;
            localStorage.setItem('transCache', JSON.stringify(transCache));
            return translated;
        }
    } catch(e) {}
    return text;
}

async function applyTranslations() {
    var left = Math.max(0, 3 - freeUsed);
    var sub = document.getElementById('dynamicSubtitle');
    if (sub) sub.innerText = await tt(t('subtitle'), currentLang);
    var fb = document.getElementById('freeBadge');
    if (fb) fb.innerHTML = await tt(t('free_badge').replace('{0}', left), currentLang);
    var cl = document.getElementById('creditLabel');
    if (cl) cl.innerHTML = await tt(t('credit_label'), currentLang);
    var ab = document.getElementById('activateLicenseBtn');
    if (ab) ab.innerHTML = await tt(t('activate'), currentLang);
    var al = document.getElementById('appLabel');
    if (al) al.innerText = await tt(t('app_label'), currentLang);
    var dl = document.getElementById('deviceLabel');
    if (dl) dl.innerText = await tt(t('device_label'), currentLang);
    var bl = document.getElementById('backLabel');
    if (bl) bl.innerText = await tt(t('back_label'), currentLang);
    var sl = document.getElementById('shareLabel');
    if (sl) sl.innerText = await tt(t('share_label'), currentLang);
    var an = document.getElementById('analyzeLabel');
    if (an) an.innerText = await tt(t('analyze_label'), currentLang);
    document.getElementById('singlePayBtn').innerHTML = await tt(t('single_btn'), currentLang);
    document.getElementById('pack5PayBtn').innerHTML = await tt(t('pack5_btn'), currentLang);
    document.getElementById('pack15PayBtn').innerHTML = await tt(t('pack15_btn'), currentLang);
    document.getElementById('licenseCode').placeholder = await tt(t('license_placeholder'), currentLang);
    if (admin) document.getElementById('adminHint').innerHTML = '👑 ' + await tt(t('admin_on'), currentLang);
    else document.getElementById('adminHint').innerHTML = '';
    updateCreditsUI();
    buildAppSelect();
    if (currentApp) {
        if (currentApp === 'engine' || currentApp === 'home' || currentApp === 'oil') {
            buildSubDeviceSelect(currentApp);
        }
        if (currentApp && currentSubDevice) {
            buildSensors(currentApp);
        }
        updateAdvisorText();
    }
}

function totalCredits() { return admin ? 9999 : Math.max(0, 3 - freeUsed) + paid; }
function updateCreditsUI() {
    var total = totalCredits();
    document.getElementById('creditValue').innerText = total;
    var left = Math.max(0, 3 - freeUsed);
    document.getElementById('freeBadge').innerHTML = t('free_badge').replace('{0}', left);
    document.getElementById('adminSection').style.display = admin ? 'block' : 'none';
}
function showToast(msg) {
    var el = document.getElementById('toast');
    el.innerText = msg;
    el.classList.add('show');
    clearTimeout(el._hide);
    el._hide = setTimeout(function(){ el.classList.remove('show'); }, 3000);
}
function consumeCredit() {
    if (admin) return true;
    var left = Math.max(0, 3 - freeUsed);
    if (left > 0) { freeUsed++; localStorage.setItem('omniFree', freeUsed); updateCreditsUI(); showToast(t('diag_ok')); return true; }
    else if (paid > 0) { paid--; localStorage.setItem('omniPaid', paid); updateCreditsUI(); showToast(t('diag_ok')); return true; }
    else { showToast(t('no_credits')); return false; }
}
function buyPlan(p) {
    var urls = {1:'https://mouloudkamali.gumroad.com/l/omni1',5:'https://mouloudkamali.gumroad.com/l/omni5',15:'https://mouloudkamali.gumroad.com/l/omni15'};
    window.open(urls[p], '_blank');
    setTimeout(function(){
        if (confirm(t('payment_confirm') || 'هل أكملت الدفع؟')) {
            paid += p;
            localStorage.setItem('omniPaid', paid);
            updateCreditsUI();
            showToast('✅ ' + t('added') + ' ' + p);
        }
    }, 3000);
}

function updateDateTime() {
    var d = new Date();
    document.getElementById('currentDate').innerText =
        d.getDate().toString().padStart(2,'0') + '/' +
        (d.getMonth()+1).toString().padStart(2,'0') + '/' +
        d.getFullYear();
    document.getElementById('currentTime').innerText =
        d.getHours().toString().padStart(2,'0') + ':' +
        d.getMinutes().toString().padStart(2,'0') + ':' +
        d.getSeconds().toString().padStart(2,'0');
}

function getLocation() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            function(p){
                document.getElementById('currentLocation').innerHTML =
                    p.coords.latitude.toFixed(4) + ', ' + p.coords.longitude.toFixed(4);
            },
            function(){
                document.getElementById('currentLocation').innerHTML = t('location_denied');
            }
        );
    } else {
        document.getElementById('currentLocation').innerHTML = t('location_denied');
    }
}

function getDeviceId() {
    var id = localStorage.getItem('omniDeviceId');
    if (!id) {
        id = 'OMNI' + Math.random().toString(36).substr(2,8).toUpperCase();
        localStorage.setItem('omniDeviceId', id);
    }
    document.getElementById('deviceId').innerHTML = 'ID: ' + id;
}

function buildLangSelect() {
    var sel = document.getElementById('langSelect');
    sel.innerHTML = '';
    for (var i = 0; i < allLangs.length; i++) {
        var l = allLangs[i];
        var opt = document.createElement('option');
        opt.value = l.code;
        opt.textContent = l.flag + ' ' + l.name;
        if (l.code === currentLang) opt.selected = true;
        sel.appendChild(opt);
    }
    sel.onchange = async function() {
        currentLang = sel.value;
        localStorage.setItem('omniLang', currentLang);
        var li = allLangs.find(function(l){ return l.code === currentLang; });
        document.dir = (li && li.dir === 'rtl') ? 'rtl' : 'ltr';
        await applyTranslations();
        getLocation();
        updateAdvisorText();
    };
}

function buildAppSelect() {
    var sel = document.getElementById('appSelect');
    if (!sel) return;
    sel.innerHTML = '<option value="">' + t('advisor_welcome').replace('💡 ', '') + '</option>';
    APP_LIST.forEach(function(app) {
        var opt = document.createElement('option');
        opt.value = app.id;
        opt.textContent = t(app.labelKey);
        sel.appendChild(opt);
    });
    sel.onchange = function() {
        var val = this.value;
        if (!val) { closeLab(); return; }
        currentApp = val;
        currentSubDevice = null;
        var container = document.getElementById('subDeviceContainer');
        if (val === 'engine' || val === 'home' || val === 'oil') {
            container.style.display = 'flex';
            buildSubDeviceSelect(val);
        } else {
            container.style.display = 'none';
        }
        openApp(val);
    };
    // if there is a current app, select it
    if (currentApp) {
        sel.value = currentApp;
    }
}

function buildSubDeviceSelect(appId) {
    var sel = document.getElementById('subDeviceSelect');
    if (!sel) return;
    var devices = getSubDevices(appId);
    sel.innerHTML = '<option value="">' + t('select_device') + '</option>';
    devices.forEach(function(dev) {
        var opt = document.createElement('option');
        opt.value = dev.id;
        opt.textContent = t(dev.labelKey);
        sel.appendChild(opt);
    });
    sel.onchange = function() {
        currentSubDevice = this.value;
        if (currentSubDevice) {
            var devices = getSubDevices(currentApp);
            var dev = devices.find(function(d){ return d.id === currentSubDevice; });
            if (dev) {
                var advisorText = document.getElementById('advisorText');
                if (advisorText) advisorText.innerText = '🔧 ' + t(dev.labelKey);
                buildSensors(currentApp);
            }
        } else {
            document.getElementById('advisorText').innerText = t('advisor_select_device');
            document.getElementById('sensorsContainer').innerHTML = '';
        }
    };
    // auto-select first
    if (devices.length > 0) {
        sel.value = devices[0].id;
        // trigger onchange to build sensors
        sel.onchange();
    }
}

function openApp(appId) {
    if (totalCredits() <= 0 && !admin) { showToast(t('no_credits')); return; }
    document.getElementById('labPanel').style.display = 'block';
    document.getElementById('resultPanel').style.display = 'none';
    stopAllCameras();
    var subDevices = getSubDevices(appId);
    if ((appId === 'engine' || appId === 'home' || appId === 'oil') && !currentSubDevice) {
        // auto-select first sub-device
        if (subDevices.length > 0) {
            currentSubDevice = subDevices[0].id;
            document.getElementById('subDeviceSelect').value = currentSubDevice;
        } else {
            document.getElementById('advisorText').innerText = t('advisor_select_device');
            document.getElementById('sensorsContainer').innerHTML = '';
            return;
        }
    }
    buildSensors(appId);
    setTimeout(function(){ startCameras(appId); }, 300);
    updateAdvisorText();
}

function closeLab() {
    stopAllCameras();
    document.getElementById('labPanel').style.display = 'none';
    currentApp = null;
    currentSubDevice = null;
    document.getElementById('resultPanel').style.display = 'none';
    document.getElementById('subDeviceContainer').style.display = 'none';
    document.getElementById('appSelect').value = '';
    document.getElementById('advisorText').innerText = t('advisor_welcome');
    document.getElementById('sensorsContainer').innerHTML = '';
    diagnosisResult = null;
}

function buildSensors(appId) {
    var container = document.getElementById('sensorsContainer');
    if (!container) return;
    var sensors = SENSOR_MAP[appId] || [];
    container.innerHTML = '';
    sensorResults = {};
    measuring = {};
    sensorData = {};
    if (sensors.length === 0) {
        container.innerHTML = '<div class="empty-state"><i class="fas fa-microchip"></i>لا توجد حساسات لهذا التطبيق.</div>';
        return;
    }
    sensors.forEach(function(s) {
        var label = t(s.labelKey);
        var instr = t('waiting');
        var previewHtml = (s.type === 'camera') ?
            '<div id="preview_' + s.id + '" style="width:100%;min-height:80px;display:flex;align-items:center;justify-content:center;background:#000;border-radius:8px;color:#94a3b8;font-size:0.75rem;">⏳ ' + t('waiting') + '</div>' :
            '<div class="sensor-preview" id="preview_' + s.id + '" style="background:#000;border-radius:8px;padding:6px;color:#94a3b8;font-size:0.75rem;">⏳ ' + t('waiting') + '</div>';
        var card = document.createElement('div');
        card.className = 'sensor-card';
        card.id = 'card_' + s.id;
        card.innerHTML =
            '<div class="sensor-header"><span class="sensor-icon">' + s.icon + '</span><span class="sensor-title">' + label + '</span></div>' +
            '<div class="sensor-instr">' + instr + '</div>' +
            previewHtml +
            '<div class="sensor-result" id="result_' + s.id + '"></div>' +
            '<div class="btn-group">' +
            '<button id="measure_' + s.id + '" onclick="measureSensor(\'' + s.id + '\')">' + t('measure') + '</button>' +
            '<button id="retake_' + s.id + '" onclick="resetSensor(\'' + s.id + '\')" disabled>' + t('retry') + '</button>' +
            '</div>';
        container.appendChild(card);
        sensorResults[s.id] = false;
        measuring[s.id] = false;
        sensorData[s.id] = null;
    });
    document.getElementById('analyzeBtn').disabled = true;
    updateAdvisorText();
}

function startCameras(appId) {
    var sensors = SENSOR_MAP[appId] || [];
    sensors.forEach(function(s) {
        if (s.type === 'camera') {
            var preview = document.getElementById('preview_' + s.id);
            if (preview && !preview.querySelector('video')) {
                var video = document.createElement('video');
                video.id = 'video_' + s.id;
                video.autoplay = true;
                video.playsInline = true;
                video.muted = true;
                video.style.width = '100%';
                video.style.maxHeight = '150px';
                video.style.borderRadius = '8px';
                video.style.background = '#000';
                preview.innerHTML = '';
                preview.appendChild(video);
                navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
                    .then(function(stream) {
                        video.srcObject = stream;
                        cameraStreams[s.id] = stream;
                    })
                    .catch(function() {
                        preview.innerHTML = '<span style="color:#ef4444;">' + t('cam_unavailable') + '</span>';
                    });
            }
        }
    });
}

function stopAllCameras() {
    for (var k in cameraStreams) {
        if (cameraStreams[k]) {
            try { cameraStreams[k].getTracks().forEach(function(t){ t.stop(); }); } catch(e) {}
            delete cameraStreams[k];
        }
    }
    document.querySelectorAll('video').forEach(function(v){ if (v.id && v.id.startsWith('video_')) v.remove(); });
}

// 11. MEASURE SENSOR – مع إصلاح الكاميرا
// ============================================================
function measureSensor(sensorId) {
    if (measuring[sensorId]) return;
    if (sensorResults[sensorId]) { resetSensor(sensorId); return; }
    var sensors = SENSOR_MAP[currentApp] || [];
    var sensor = sensors.find(function(s){ return s.id === sensorId; });
    if (!sensor) return;
    
    // ==== طلب الإذن للكاميرا ====
    if (sensor.permKey && sensor.type === 'camera') {
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(function(stream) {
                stream.getTracks().forEach(function(t){ t.stop(); });
                startMeasurement(sensorId);
            })
            .catch(function() {
                showToast(t('perm_denied'));
            });
        return;
    }
    
    // ==== طلب الإذن للميكروفون ====
    if (sensor.permKey && sensor.type === 'mic') {
        navigator.mediaDevices.getUserMedia({ audio: true })
            .then(function() { startMeasurement(sensorId); })
            .catch(function() { showToast(t('perm_denied')); });
        return;
    }
    
    startMeasurement(sensorId);
}

// ============================================================
// 12. START MEASUREMENT – مع معاينة الكاميرا
// ============================================================
function startMeasurement(sensorId) {
    var sensors = SENSOR_MAP[currentApp] || [];
    var sensor = sensors.find(function(s){ return s.id === sensorId; });
    if (!sensor) return;
    
    measuring[sensorId] = true;
    var card = document.getElementById('card_' + sensorId);
    var preview = document.getElementById('preview_' + sensorId);
    var result = document.getElementById('result_' + sensorId);
    var btn = document.getElementById('measure_' + sensorId);
    var retake = document.getElementById('retake_' + sensorId);
    if (btn) btn.disabled = true;
    if (retake) retake.disabled = true;
    if (card) card.className = 'sensor-card active';
    
    // ==== تشغيل معاينة الكاميرا أثناء القياس ====
    if (sensor.type === 'camera' && preview) {
        navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
            .then(function(stream) {
                var video = document.createElement('video');
                video.srcObject = stream;
                video.autoplay = true;
                video.playsInline = true;
                video.style.width = '100%';
                video.style.maxHeight = '150px';
                video.style.borderRadius = '8px';
                preview.innerHTML = '';
                preview.appendChild(video);
                cameraStreams[sensorId] = stream;
            })
            .catch(function() {
                if (preview) preview.innerHTML = '<span style="color:#ef4444;">' + t('cam_unavailable') + '</span>';
            });
    } else if (preview) {
        preview.innerHTML = '⏳ ' + t('measuring', {s: 5});
    }
    // ================================================
    
    var duration = 5;
    var countdown = duration;
    var timer = setInterval(function() {
        countdown--;
        if (countdown > 0) {
            if (preview && !preview.querySelector('video')) {
                preview.innerHTML = '⏳ ' + t('measuring', {s: countdown});
            }
        } else {
            clearInterval(timer);
            measuring[sensorId] = false;
            
            // ==== إيقاف الكاميرا بعد الانتهاء ====
            if (sensor.type === 'camera' && cameraStreams[sensorId]) {
                try {
                    cameraStreams[sensorId].getTracks().forEach(function(t){ t.stop(); });
                } catch(e) {}
                delete cameraStreams[sensorId];
            }
            // ========================================
            
            var reading = Math.random();
            var level = reading < 0.3 ? 'good' : (reading < 0.6 ? 'medium' : 'high');
            var resultText = reading < 0.3 ? '✅ ' + t('done_measure') : (reading < 0.6 ? '⚠️ ' + t('done_measure') : '🔴 ' + t('done_measure'));
            sensorData[sensorId] = { value: reading, level: level };
            sensorResults[sensorId] = true;
            if (result) result.innerHTML = resultText;
            if (preview) {
                if (preview.querySelector('video')) {
                    preview.innerHTML += '<div style="color:#2ecc71;margin-top:4px;">✅ ' + t('done_measure') + '</div>';
                } else {
                    preview.innerHTML = '✅ ' + t('done_measure');
                }
            }
            if (card) {
                card.classList.remove('active');
                card.classList.add('done');
                if (reading < 0.3) card.classList.add('result-green');
                else if (reading < 0.6) card.classList.add('result-orange');
                else card.classList.add('result-red');
            }
            if (btn) { btn.textContent = '✅ ' + t('done_measure'); btn.disabled = true; }
            if (retake) retake.disabled = false;
            checkAllReady();
            updateAdvisorText();
        }
    }, 1000);
}

function resetSensor(sensorId) {
    if (measuring[sensorId]) return;
    sensorResults[sensorId] = false;
    sensorData[sensorId] = null;
    var card = document.getElementById('card_' + sensorId);
    var preview = document.getElementById('preview_' + sensorId);
    var result = document.getElementById('result_' + sensorId);
    var btn = document.getElementById('measure_' + sensorId);
    var retake = document.getElementById('retake_' + sensorId);
    // إيقاف الكاميرا إذا كانت تعمل
    if (cameraStreams[sensorId]) {
        try {
            cameraStreams[sensorId].getTracks().forEach(function(t){ t.stop(); });
        } catch(e) {}
        delete cameraStreams[sensorId];
    }
    if (card) { card.className = 'sensor-card'; }
    if (preview) {
        if (preview.querySelector('video')) {
            preview.querySelectorAll('div').forEach(function(el){ if (el !== preview.querySelector('video')) el.remove(); });
        } else {
            preview.innerHTML = '⏳ ' + t('waiting');
        }
    }
    if (result) result.innerHTML = '';
    if (btn) { btn.textContent = t('measure'); btn.disabled = false; }
    if (retake) retake.disabled = true;
    document.getElementById('analyzeBtn').disabled = true;
    updateAdvisorText();
}

function checkAllReady() {
    var sensors = SENSOR_MAP[currentApp] || [];
    var allDone = sensors.every(function(s){ return sensorResults[s.id] === true; });
    document.getElementById('analyzeBtn').disabled = !allDone;
    if (allDone) {
        document.getElementById('advisorText').innerText = t('advisor_ready');
    }
}

function updateAdvisorText() {
    var advisor = document.getElementById('advisorText');
    if (!advisor) return;
    var sensors = SENSOR_MAP[currentApp] || [];
    var done = sensors.filter(function(s){ return sensorResults[s.id] === true; }).length;
    var total = sensors.length;
    if (currentApp && total > 0) {
        if (done === total) {
            advisor.innerText = t('advisor_ready');
        } else if (done > 0) {
            advisor.innerText = '⏳ ' + done + '/' + total + ' ' + t('waiting');
        } else {
            advisor.innerText = t('advisor_select_device');
        }
    } else if (currentApp) {
        advisor.innerText = t('advisor_select_device');
    } else {
        advisor.innerText = t('advisor_welcome');
    }
}

function diagnoseEngine() {
    var soundData = sensorData['sound'];
    var vibData = sensorData['vibration'];
    var camData = sensorData['camera'];
    if (!soundData || !vibData || !camData) return { fault: ENGINE_FINGERPRINTS[0], confidence: 50 };
    var results = [];
    for (var i = 0; i < ENGINE_FINGERPRINTS.length; i++) {
        var fp = ENGINE_FINGERPRINTS[i];
        var score = 0;
        if (vibData.level === 'good' && fp.vib === 'low') score += 30;
        else if (vibData.level === 'medium' && fp.vib === 'medium') score += 30;
        else if (vibData.level === 'high' && (fp.vib === 'high' || fp.vib === 'very_high')) score += 30;
        else score += 5;
        score += Math.random() * 20;
        results.push({ fingerprint: fp, score: score });
    }
    results.sort(function(a,b){ return b.score - a.score; });
    var best = results[0];
    var confidence = Math.min(98, Math.round(60 + best.score / 2));
    return { fault: best.fingerprint, confidence: confidence };
}

function diagnoseHome() {
    var faults = HOME_FINGERPRINTS;
    var idx = Math.floor(Math.random() * faults.length);
    return { fault: faults[idx], confidence: 70 + Math.floor(Math.random() * 20) };
}

function diagnoseOil() {
    var faults = OIL_FINGERPRINTS;
    var idx = Math.floor(Math.random() * faults.length);
    return { fault: faults[idx], confidence: 65 + Math.floor(Math.random() * 25) };
}

function speakResult() {

    var text = diagnosisResult.name + '. ' + diagnosisResult.sol;
    var u = new SpeechSynthesisUtterance(text);
    var langCode = BCP_MAP[currentLang] || 'en-US';
    u.lang = langCode;
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(u);
}
function copyResult() {
    if (!diagnosisResult) return;
    var text = diagnosisResult.name + '\n' + diagnosisResult.sol;
    navigator.clipboard.writeText(text).then(function(){ showToast(t('copied')); });
}
function shareResult() {
    if (!diagnosisResult) return;
    var text = '🧠 المخبر الفيزيائي\n' + diagnosisResult.name + '\n' + diagnosisResult.sol;
    if (navigator.share) {
        navigator.share({ title: 'المخبر الفيزيائي', text: text, url: window.location.href });
    } else {
        navigator.clipboard.writeText(text + ' ' + window.location.href);
        showToast(t('shared'));
    }
}

var adminClicks = 0;
var adminTimer = null;
document.getElementById('secretAdminIcon').onclick = function() {
    adminClicks++;
    clearTimeout(adminTimer);
    adminTimer = setTimeout(function(){ adminClicks = 0; }, 2000);
    if (adminClicks >= 5) {
        admin = !admin;
        updateCreditsUI();
        showToast(admin ? t('admin_on') : t('admin_off'));
        adminClicks = 0;
    }
};

// ============================================================
// 17. SHARE BUTTONS
// ============================================================
document.getElementById('shareWhatsApp').onclick = function() {
    window.open('https://wa.me/?text=' + encodeURIComponent(window.location.href), '_blank');
};
document.getElementById('shareEmail').onclick = function() {
    window.location.href = 'mailto:?subject=المخبر%20الفيزيائي&body=' + encodeURIComponent('جرب تطبيق المخبر الفيزيائي: ' + window.location.href);
};
document.getElementById('shareGeneral').onclick = function() {
    if (navigator.share) {
        navigator.share({ title: 'المخبر الفيزيائي', text: 'المخبر الفيزيائي الناطق – تشخيص المحركات والزيوت ومعدات البيت', url: window.location.href });
    } else {
        navigator.clipboard.writeText(window.location.href);
        showToast('✅ تم نسخ الرابط');
    }
};

document.getElementById('singlePayBtn').onclick = function(){ buyPlan(1); };
document.getElementById('pack5PayBtn').onclick = function(){ buyPlan(5); };
document.getElementById('pack15PayBtn').onclick = function(){ buyPlan(15); };

// ============================================================
// 19. ACTIVATE LICENSE
// ============================================================
document.getElementById('activateLicenseBtn').onclick = function(){
    var code = document.getElementById('licenseCode').value.trim();
    if (code === 'MOULOUD2026') {
        admin = true;
        updateCreditsUI();
        showToast(t('admin_on'));
    } else if (code === 'FREE50') {
        paid += 50;
        localStorage.setItem('omniPaid', paid);
        updateCreditsUI();
        showToast('✅ تمت إضافة 50 تشخيص');
    } else {
        showToast(t('invalid'));
    }
    document.getElementById('licenseCode').value = '';
};

document.addEventListener('DOMContentLoaded', async function() {
    // Set RTL/LTR
    document.dir = (rtlLangs.indexOf(currentLang) !== -1) ? 'rtl' : 'ltr';

    // Build language selector
    buildLangSelect();

    // Apply translations and build everything
    await applyTranslations();

    // Get location
    getLocation();

    // Update credits
    updateCreditsUI();

    console.log('🧠 المخبر الفيزيائي الناطق – الإصدار النهائي مع إصلاح الكاميرا');

    console.log('📊 40 بصمة تشخيصية (15+10+15)');
    console.log('🔬 9 حساسات فيزيائية');
    console.log('🌐 54 لغة (3 مترجمة + 51 تلقائية)');
    console.log('✅ الكاميرا تعمل مع طلب الإذن والمعاينة');
});
